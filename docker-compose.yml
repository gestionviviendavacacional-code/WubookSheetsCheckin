version: '3.8'

services:
  wubook-checkin:
    build: .
    container_name: wubook-checkin
    ports:
      - "8080:8080"
    restart: always
    environment:
      - PORT=8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
